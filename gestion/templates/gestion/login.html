{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acceso · Dulcecita Gestión</title>
  <link rel="icon" type="image/png" href="{% static 'img/loggo.png' %}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root { --dr-pink: #f6a7d6; --dr-pink-soft: #f3d9e8; --dr-pink-read: #e06bae; --ink: #4f3e42; }
    * { box-sizing: border-box; }
    body {
      font-family: 'Manrope', sans-serif; color: var(--ink); background: #fff;
      min-height: 100vh; margin: 0; display: flex; align-items: center; justify-content: center;
      padding: 1.2rem;
    }
    .dr-login-card {
      width: 100%; max-width: 380px; background: #fff; border-radius: 22px;
      box-shadow: 0 22px 50px rgba(0,0,0,.10); overflow: hidden;
      border: 1px solid var(--dr-pink-soft);
    }
    .dr-login-head {
      background: var(--dr-pink); padding: 2rem 1.5rem 1.6rem; text-align: center;
    }
    .dr-login-logo { height: 76px; width: auto; }
    .dr-login-body { padding: 1.7rem 1.6rem 1.9rem; }
    .dr-login-title {
      font-family: 'Playfair Display', serif; font-size: 1.35rem; color: #2f1f22;
      text-align: center; margin: 0 0 1.2rem;
    }
    .form-control { border-color: var(--dr-pink-soft); border-radius: 12px; margin-bottom: .9rem; }
    .form-control:focus { border-color: var(--dr-pink); box-shadow: 0 0 0 .2rem rgba(246,167,214,.4); }
    .btn-login {
      width: 100%; background: var(--dr-pink); color: #fff; border: none;
      border-radius: 999px; padding: .7rem 1rem; font-weight: 800; letter-spacing: .04em;
      transition: transform .15s ease, background .2s ease;
    }
    .btn-login:hover { background: var(--dr-pink-read); transform: translateY(-1px); }
    .dr-login-error {
      background: #fdf2f8; color: var(--dr-pink-read); border: 1px solid var(--dr-pink-soft);
      border-radius: 12px; padding: .6rem .8rem; font-size: .9rem; margin-bottom: 1rem; text-align: center;
    }
    .dr-login-foot { text-align: center; margin-top: 1.1rem; font-size: .78rem; color: #9b8a90; }
  </style>
</head>
<body>
  <div class="dr-login-card">
    <div class="dr-login-head">
      <img src="{% static 'img/logo-dulcecita.png' %}?v=2" alt="Dulcecita" class="dr-login-logo">
    </div>
    <div class="dr-login-body">
      <p class="dr-login-title">Gestión</p>

      {% if form.errors %}
        <div class="dr-login-error">Usuario o contraseña incorrectos.</div>
      {% endif %}

      <form method="post" action="{% url 'gestion:login' %}">
        {% csrf_token %}
        {{ form.username }}
        {{ form.password }}
        <input type="hidden" name="next" value="{{ request.GET.next }}">
        <button type="submit" class="btn-login">Entrar</button>
      </form>

      <p class="dr-login-foot">Acceso privado · Dulcecita</p>
    </div>
  </div>
</body>
</html>
