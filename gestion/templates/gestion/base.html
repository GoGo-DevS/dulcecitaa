{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Dulcecita · Gestión{% endblock %}</title>
    <link rel="icon" type="image/png" href="{% static 'img/loggo.png' %}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        /* Misma estética que la web Dulcecita: blanco + rosado #f6a7d6 */
        :root {
            --dr-pink: #f6a7d6;          /* rosado marca (franja/botones) */
            --dr-pink-soft: #f3d9e8;     /* bordes suaves */
            --dr-pink-read: #e06bae;     /* rosado legible para textos/acentos finos */
            --ink-900: #2f1f22; --ink-700: #4f3e42; --ink-500: #6f5a60;
            --shadow-soft: 0 14px 30px rgba(0, 0, 0, 0.07);
            --radius-md: 16px; --radius-sm: 10px;
            --bs-primary: var(--dr-pink);
        }
        body {
            font-family: 'Manrope', sans-serif;
            color: var(--ink-700);
            background: #fff;            /* fondo blanco como la web */
            min-height: 100vh;
            padding-bottom: 80px;
        }
        h1,h2,h3,h4,h5,h6,.font-display { font-family: 'Playfair Display', serif; color: var(--ink-900); }
        .brand-logo { height: 52px; width: auto; display: block; }
        .text-dc { color: var(--dr-pink-read); }
        .eyebrow { font-size:.72rem; font-weight:700; letter-spacing:.14em; text-transform:uppercase; color: var(--dr-pink-read); }

        /* Botones: rosado relleno + texto blanco, pastilla redonda (igual que la web) */
        .btn-dc { background: var(--dr-pink); border-color: var(--dr-pink); color: #fff; border-radius: 999px; font-weight: 700; }
        .btn-dc:hover, .btn-dc:focus { background: var(--dr-pink-read); border-color: var(--dr-pink-read); color: #fff; }
        .btn-outline-dc { border-color: var(--dr-pink); color: var(--dr-pink-read); border-radius: 999px; font-weight: 700; }
        .btn-outline-dc:hover { background: var(--dr-pink); color: #fff; }

        .card { border: 1px solid var(--dr-pink-soft); box-shadow: var(--shadow-soft); border-radius: var(--radius-md); background: #fff; }
        .card-header { background: #fff; border-bottom: 1px solid var(--dr-pink-soft); font-family: 'Playfair Display', serif; color: var(--ink-900); }
        .badge.bg-secondary { background: var(--ink-500) !important; }

        .surface-rose { background: var(--dr-pink); color: #fff; border: none; }
        .form-control, .form-select { border-color: var(--dr-pink-soft); border-radius: var(--radius-sm); }
        .form-control:focus, .form-select:focus { border-color: var(--dr-pink); box-shadow: 0 0 0 .2rem rgba(246,167,214,.35); }
        .list-group-item-action:hover { background: #fdf2f8; }

        /* Navbar superior: franja rosada con el logo blanco (como la web) */
        .navbar.app-bar { background: var(--dr-pink); border-bottom: 1px solid var(--dr-pink-soft); }

        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: #fff; backdrop-filter: blur(8px);
            border-top: 1px solid var(--dr-pink-soft); display: flex; justify-content: space-around;
            padding: 8px 0; z-index: 1030;
        }
        .bottom-nav a { color: var(--ink-500); text-decoration: none; font-size: .72rem; text-align: center; flex: 1; font-weight: 600; }
        .bottom-nav a.active { color: var(--dr-pink-read); }
        .bottom-nav i { display: block; font-size: 1.3rem; }
    </style>
</head>
<body>
    <nav class="navbar app-bar sticky-top">
        <div class="container-fluid d-flex align-items-center">
            <a class="navbar-brand d-flex align-items-center" href="{% url 'gestion:dashboard' %}">
                <img src="{% static 'img/logo-dulcecita.png' %}?v=3" alt="Dulcecita" class="brand-logo">
            </a>
            {% if user.is_authenticated %}
            <form method="post" action="{% url 'gestion:logout' %}" class="ms-auto m-0">
                {% csrf_token %}
                <button type="submit" class="btn btn-link text-white p-0" style="font-size:1.3rem;" title="Cerrar sesión" aria-label="Cerrar sesión">
                    <i class="bi bi-box-arrow-right"></i>
                </button>
            </form>
            {% endif %}
        </div>
    </nav>

    <main class="container py-3">
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            {% endfor %}
        {% endif %}
        {% block content %}{% endblock %}
    </main>

    <nav class="bottom-nav">
        <a href="{% url 'gestion:dashboard' %}" class="{% block nav_inicio %}{% endblock %}">
            <i class="bi bi-house-door"></i>Inicio
        </a>
        <a href="{% url 'gestion:pedidos' %}" class="{% block nav_pedidos %}{% endblock %}">
            <i class="bi bi-receipt"></i>Pedidos
        </a>
        <a href="{% url 'gestion:clientes' %}" class="{% block nav_clientes %}{% endblock %}">
            <i class="bi bi-people"></i>Clientes
        </a>
    </nav>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
