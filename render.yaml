databases:
  - name: dulcecitaa-db
    plan: free
    databaseName: dulcecitaa
    user: dulcecitaa

services:
  - type: web
    name: dulcecitaa
    runtime: python
    plan: free
    branch: main
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --no-input && python manage.py migrate --no-input && python manage.py seed_data"
    startCommand: "gunicorn reposteria.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: BRAND_NAME
        value: "Dulcecita"
      - key: WEBSITE_URL          # base para link del footer y logo de los correos
        value: "https://dulcecitaa.onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: dulcecitaa-db
          property: connectionString
      # Cloudinary: pega el valor en el dashboard de Render (Environment).
      # NO se versiona aquí porque contiene el API secret.
      - key: CLOUDINARY_URL
        sync: false
      - key: PYTHON_VERSION
        value: "3.12.7"
      - key: WEB_CONCURRENCY
        value: "4"
      # ── Correo (SMTP) ──────────────────────────────────────────────
      # Sin EMAIL_HOST_USER/PASSWORD los correos de pedido NO se envian.
      # Pega los valores en el dashboard de Render (Environment).
      - key: EMAIL_HOST
        value: "smtp.gmail.com"
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_USE_TLS
        value: "True"
      - key: EMAIL_HOST_USER          # tu correo Gmail completo
        sync: false
      - key: EMAIL_HOST_PASSWORD      # CLAVE DE APLICACION de Gmail (no la normal)
        sync: false
      - key: DEFAULT_FROM_EMAIL       # ej: Dulcecita <tucorreo@gmail.com>
        sync: false
      - key: CONTACT_EMAIL            # donde te llegan los pedidos
        sync: false
